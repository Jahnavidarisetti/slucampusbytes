services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports:
      - "${SERVER_HOST_PORT:-5001}:5000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    command: npm run dev

  client:
    build:
      context: ./client
    env_file:
      - ./client/.env
    environment:
      VITE_API_BASE_URL: http://localhost:${SERVER_HOST_PORT:-5001}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - server
    command: npm run dev -- --host 0.0.0.0

volumes:
  client_node_modules:
  server_node_modules:
