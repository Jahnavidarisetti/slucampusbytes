name: CI

"on":
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect Npm Project
        id: npm
        run: |
          if [ -f package.json ]; then
            echo "has_root=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_root=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.npm.outputs.has_root == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.npm.outputs.has_root == 'true'
        run: npm install

      - name: Test
        if: steps.npm.outputs.has_root == 'true'
        run: npm test

      - name: Skip
        if: steps.npm.outputs.has_root != 'true'
        run: echo "No root package.json found; skipping npm install/test."
