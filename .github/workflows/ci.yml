name: CI

"on":
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect Npm Project
        id: npm
        run: |
          if [ -f package.json ]; then
            echo "has_root=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_root=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.npm.outputs.has_root == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install
        if: steps.npm.outputs.has_root == 'true'
        run: npm install

      - name: Install Client
        if: steps.npm.outputs.has_root == 'true'
        working-directory: client
        run: npm ci

      - name: Run Client Lint
        if: steps.npm.outputs.has_root == 'true'
        working-directory: client
        run: npm run lint

      - name: Run Client Tests
        if: steps.npm.outputs.has_root == 'true'
        working-directory: client
        run: npm test -- --run

      - name: Build Client
        if: steps.npm.outputs.has_root == 'true'
        working-directory: client
        run: npm run build

      - name: Install Server
        if: steps.npm.outputs.has_root == 'true'
        working-directory: server
        run: npm ci

      - name: Run Server Tests
        if: steps.npm.outputs.has_root == 'true'
        working-directory: server
        run: npm test

      - name: Run Tests (if available)
        if: steps.npm.outputs.has_root == 'true'
        run: |
          echo "Checking for test script..."

          if npm run | grep -q "test"; then
            echo "Test script found. Running tests..."
            npm test
          else
            echo "No test script found. Skipping tests."
          fi

      - name: Skip
        if: steps.npm.outputs.has_root != 'true'
        run: echo "No root package.json found; skipping npm install/test."
