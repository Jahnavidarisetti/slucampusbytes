New-Item -ItemType Directory -Force .github/workflows | Out-Null
@'
name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Test
        run: npm test
'@ | Set-Content .github/workflows/ci.yml
